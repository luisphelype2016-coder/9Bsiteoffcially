<!DOCTYPE html>
<html>

<head>

<title>Assuntos - Portal 9B</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<canvas id="galaxy"></canvas>

<div class="navbar">

<h2>Portal 9B</h2>

<div class="menu">

<a href="/home">Home</a>
<a href="/assuntos">Assuntos</a>
<a href="/atividades">Atividades</a>
<a href="/grupos">Grupos</a>

</div>

</div>

<div class="container">

<h1>Assuntos do Mês</h1>

<div class="card">

<form method="POST">

<input type="texto" name="titulo" placeholder="Título do assunto">

<textarea name="conteudo" placeholder="Conteúdo"></textarea>

<button class="btn">Publicar</button>

</form>

</div>

<div class="posts">

{% for assunto in assuntos %}

<div class="post">

<h3>{{assunto.titulo}}</h3>

<p>{{assunto.conteudo}}</p>

<small>Postado por {{assunto.autor}}</small>

</div>

{% endfor %}

</div>

</div>

<div class="ai-button" onclick="toggleAI()">🤖</div>

<div class="ai-chat" id="aiChat">
<input type="texto">
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='galaxy.js') }}"></script>

{% for assunto in assuntos %}

<div class="card">

<h3>{{assunto.titulo}}</h3>

<p>{{assunto.texto}}</p>

<p>Postado por: {{assunto.autor}}</p>

<a href="/deletar_assunto/{{assunto.id}}">
<button class="btn-delete">Excluir</button>
</a>

</div>

{% endfor %}

</body>
</html>
