<!DOCTYPE html>
<html>

<head>

<title>Grupos</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<canvas id="galaxy"></canvas>

<div class="navbar">

<h2>Portal 9B</h2>

<div class="menu">

<a href="/home">Home</a>
<a href="/assuntos">Assuntos</a>
<a href="/atividades">Atividades</a>
<a href="/grupos">Grupos</a>

</div>

</div>

<div class="container">

<h1>Grupos de Trabalho</h1>

<div class="card">

<form method="POST">

<input type="texto" name="nome_grupo" placeholder="Nome do grupo">

<input type="texto" name="participantes" placeholder="Participantes">

<button class="btn">Criar grupo</button>

</form>

</div>

<div class="posts">

{% for grupo in grupos %}

<div class="post">

<h3>{{grupo.nome}}</h3>

<a href="/grupo/{{loop.index0}}">
<button class="btn">Entrar no grupo</button>
</a>

<p>Criado por {{grupo.criador}}</p>

</div>

{% endfor %}

</div>

</div>

<div class="ai-button" onclick="toggleAI()">🤖</div>

<div class="ai-chat" id="aiChat">
<input type="texto">
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='galaxy.js') }}"></script>

{% for grupo in grupos %}

<div class="card">

<h3>{{grupo.nome}}</h3>

<p>Participantes: {{grupo.participantes}}</p>

<p>Criado por: {{grupo.criador}}</p>

<a href="/grupo/{{grupo.id}}">
<button class="btn">Entrar</button>
</a>

<a href="/deletar_grupo/{{grupo.id}}">
<button class="btn-delete">Excluir</button>
</a>

</div>

{% endfor %}

</body>
</html>
