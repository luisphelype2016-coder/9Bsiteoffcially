<!DOCTYPE html>
<html>

<head>

<title>Chat do Grupo</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<h2>Portal 9B</h2>

<div class="menu">
<a href="/home">Home</a>
<a href="/grupos">Grupos</a>
</div>

</div>

<div class="container">

<h1>Chat do grupo {{grupo.nome}}</h1>

<div class="posts">

{% for mensagem in mensagens %}

<div class="card">

<strong>{{mensagem.autor}}</strong>

<span class="hora">{{mensagem.datahora}}</span>

<p>{{mensagem.mensagem}}</p>

</div>

{% endfor %}

</div>

<div class="card">

<form method="POST">

<input type="text" name="mensagem" placeholder="Digite sua mensagem">

<button class="btn">Enviar</button>

</form>

</div>

</div>

</body>
</html>
